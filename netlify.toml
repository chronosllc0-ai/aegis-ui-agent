# ──────────────────────────────────────────────────────────────────────
# Netlify configuration for Aegis UI
# Deploys the React/Vite frontend as a static site.
# The FastAPI backend runs separately (Railway, Fly, etc.)
# ──────────────────────────────────────────────────────────────────────

[build]
  base = "."
  command = "npm ci && npm run -w frontend build"
  publish = "frontend/dist"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Environment variables (set in Netlify dashboard) ─────────────────
#
# Recommended production values:
#   VITE_DOCS_SITE_URL = https://docs.mohex.org
#
# If you keep the backend on the Railway default domain instead:
#
# These are baked into the build at deploy time via Vite's env handling.

[build.environment]
  NODE_VERSION = "22"

# ── Security headers ─────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
