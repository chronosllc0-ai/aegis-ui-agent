# ──────────────────────────────────────────────────────────────────────
# Netlify configuration for Aegis UI
# Deploys the React/Vite frontend as a static site.
# The FastAPI backend runs separately (Railway, Fly, etc.)
# ──────────────────────────────────────────────────────────────────────

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Environment variables (set in Netlify dashboard) ─────────────────
#
# Recommended production values:
#   VITE_API_URL      = https://api.mohex.org
#   VITE_WS_URL       = wss://api.mohex.org/ws/navigate
#   VITE_DOCS_SITE_URL = https://docs.mohex.org
#
# If you keep the backend on the Railway default domain instead:
#   VITE_API_URL      = https://your-backend.up.railway.app
#   VITE_WS_URL       = wss://your-backend.up.railway.app/ws/navigate
#
# These are baked into the build at deploy time via Vite's env handling.

[build.environment]
  NODE_VERSION = "22"
  VITE_API_URL = "https://web-production-89bf4.up.railway.app"
  VITE_WS_URL = "wss://web-production-89bf4.up.railway.app/ws/navigate"

# ── Security headers ─────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
