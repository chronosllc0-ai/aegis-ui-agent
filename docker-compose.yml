version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID:-aegis-hackathon}
      - ENVIRONMENT=development
    volumes:
      - ./:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL=http://localhost:8080
        VITE_WS_URL=ws://localhost:8080/ws/navigate
    ports:
      - "3000:8080"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
